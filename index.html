<!-- RSVP SECTION START -->
<section id="guest-list" style="padding: 50px 20px; max-width: 600px; margin: auto; font-family: sans-serif;">
  <h2 style="text-align: center;">RSVP & Guest List</h2>
  <p style="text-align: center;">Please let us know your plans so we can make the necessary arrangements.</p>

  <!-- Replace "YOUR_ACCESS_KEY_HERE" with your free key from web3forms.com -->
  <form action="https://api.web3forms.com/submit" method="POST" style="display: flex; flex-direction: column; gap: 15px;">
    
    <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">

    <!-- Names & Contact -->
    <label>
      <strong>Full Name(s):</strong><br>
      <input type="text" name="Names" required style="width: 100%; padding: 8px;">
    </label>

    <label>
      <strong>Contact Number / WhatsApp:</strong><br>
      <input type="tel" name="Phone" required style="width: 100%; padding: 8px;">
    </label>

    <!-- Events Attending -->
    <fieldset style="padding: 10px;">
      <legend><strong>Which events will you be attending?</strong></legend>
      <label><input type="checkbox" name="Events" value="Fixation"> Fixation</label><br>
      <label><input type="checkbox" name="Events" value="Engagement"> Engagement</label><br>
      <label><input type="checkbox" name="Events" value="Madhuramveppu"> Madhuramveppu</label><br>
      <label><input type="checkbox" name="Events" value="Wedding"> Wedding</label>
    </fieldset>

    <!-- Food & Drinks -->
    <fieldset style="padding: 10px;">
      <legend><strong>Beverage Preference</strong></legend>
      <label><input type="radio" name="Alcohol" value="Yes" required> I will be having drinks</label><br>
      <label><input type="radio" name="Alcohol" value="No"> I do not drink alcohol</label>
    </fieldset>

    <!-- Accommodation -->
    <label>
      <strong>Accommodation Needed:</strong><br>
      <select name="Accommodation" style="width: 100%; padding: 8px;">
        <option value="None">I have my own arrangements</option>
        <option value="Need 1 Room">Need 1 Room</option>
        <option value="Need 2 Rooms">Need 2 Rooms</option>
        <option value="Group Accommodation">Group Accommodation</option>
      </select>
    </label>

    <!-- Travel Details -->
    <label>
      <strong>Travel Plans (Arrival time, Train/Flight info, pickup needs):</strong><br>
      <textarea name="Travel" rows="3" style="width: 100%; padding: 8px;" placeholder="E.g., Arriving via train on Nov 14th at 9 AM. Need pickup."></textarea>
    </label>

    <!-- Assistance Required -->
    <label>
      <strong>Special Assistance Required (Wheelchair, dietary restrictions, elderly care):</strong><br>
      <textarea name="Assistance" rows="2" style="width: 100%; padding: 8px;" placeholder="Let us know how we can make you comfortable..."></textarea>
    </label>

    <!-- Submit -->
    <button type="submit" style="padding: 12px; background-color: #2c3e50; color: white; border: none; cursor: pointer; font-size: 16px;">Submit RSVP</button>

  </form>
</section>
<!-- RSVP SECTION END -->
