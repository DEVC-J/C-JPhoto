<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You! ✨</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Custom Configuration for our Cute Animations -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    animation: {
                        'bounce-slow': 'bounce 4s ease-in-out infinite',
                        'bounce-slower': 'bounce 5s ease-in-out infinite',
                        'pulse-slow': 'pulse 2s ease-in-out infinite',
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-[#fff0f3] text-slate-800 font-sans pb-20 selection:bg-rose-300">

    <!-- CUTE HEADER SECTION -->
    <div class="pt-16 pb-12 px-6 text-center max-w-4xl mx-auto relative">
        
        <!-- Floating Background Florks -->
        <div id="header-flork-1" class="absolute top-4 left-4 md:left-12 animate-bounce-slow hidden sm:block rotate-[-10deg]"></div>
        <div id="header-flork-2" class="absolute top-10 right-4 md:right-12 animate-bounce-slower hidden sm:block rotate-[15deg]"></div>

        <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 tracking-tight mb-4 flex flex-col items-center justify-center gap-4">
            <span class="text-rose-500 font-serif italic text-3xl">Forrr youuu,</span>
            <span>Another surpriseee mahh prettyyyy girlll 🥺💖</span>
        </h1>
        
        <p class="text-lg text-slate-600 max-w-xl mx-auto font-medium mt-4 bg-white/60 backdrop-blur-sm py-2 px-6 rounded-full inline-block shadow-sm">
            I updated the list with all your Instagram links ✨
        </p>
    </div>

    <!-- MAIN CARDS CONTAINER -->
    <div class="max-w-7xl mx-auto px-4 md:px-8">
        <div id="cards-container" class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-8">
            <!-- Cards will be injected here by JavaScript -->
        </div>
        
        <!-- Footer Message -->
        <div class="mt-16 text-center flex flex-col items-center justify-center">
            <div id="footer-flork" class="mb-2 hover:animate-bounce cursor-pointer"></div>
            <p class="text-rose-500 font-bold text-xl tracking-wide">
                Made with all my cuddlessss for youuu! 💕
            </p>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC & DATA -->
    <script>
        // --- CUSTOM CUTE FLORK STICK FIGURE GENERATOR ---
        function getFlorkSvg(variant, className = "w-32 h-32") {
            let props = '';
            
            if (variant === 'heart') {
                props = `
                    <g class="animate-pulse-slow">
                        <!-- Big Heart -->
                        <path d="M 75 105 C 75 105, 50 85, 50 70 C 50 55, 70 55, 75 70 C 80 55, 100 55, 100 70 C 100 85, 75 105, 75 105 Z" fill="#e11d48" stroke="#111827" stroke-width="4" stroke-linejoin="round"/>
                        <!-- Arms hugging heart -->
                        <path d="M 35 90 C 20 90, 15 105, 45 100" stroke="#111827" stroke-width="5" fill="none" stroke-linecap="round"/>
                        <path d="M 115 90 C 130 90, 135 105, 105 100" stroke="#111827" stroke-width="5" fill="none" stroke-linecap="round"/>
                    </g>
                `;
            } else if (variant === 'camera') {
                props = `
                    <g>
                        <!-- Camera Body -->
                        <rect x="55" y="85" width="40" height="25" rx="4" fill="#cbd5e1" stroke="#111827" stroke-width="4"/>
                        <circle cx="75" cy="97" r="8" fill="white" stroke="#111827" stroke-width="4"/>
                        <circle cx="88" cy="90" r="2" fill="#111827"/>
                        <!-- Arms holding camera -->
                        <path d="M 35 95 C 20 95, 40 105, 55 100" stroke="#111827" stroke-width="5" fill="none" stroke-linecap="round"/>
                        <path d="M 115 95 C 130 95, 110 105, 95 100" stroke="#111827" stroke-width="5" fill="none" stroke-linecap="round"/>
                    </g>
                `;
            } else if (variant === 'flower') {
                props = `
                    <g>
                        <!-- Stem & Leaf -->
                        <path d="M 85 85 L 85 130" stroke="#16a34a" stroke-width="4" stroke-linecap="round"/>
                        <path d="M 85 110 Q 100 100 105 115" stroke="#16a34a" stroke-width="4" fill="none" stroke-linecap="round"/>
                        <!-- Sunflower Petals -->
                        <path d="M 85 85 M 85 65 L 90 75 L 100 70 L 95 80 L 105 85 L 95 90 L 100 100 L 90 95 L 85 105 L 80 95 L 70 100 L 75 90 L 65 85 L 75 80 L 70 70 L 80 75 Z" fill="#fbbf24" stroke="#f59e0b" stroke-width="2"/>
                        <!-- Flower Center -->
                        <circle cx="85" cy="85" r="5" fill="#92400e" stroke="#111827" stroke-width="2"/>
                        <!-- Arms holding flower -->
                        <path d="M 35 100 C 20 100, 60 110, 85 110" stroke="#111827" stroke-width="5" fill="none" stroke-linecap="round"/>
                        <path d="M 115 100 C 130 100, 100 110, 85 110" stroke="#111827" stroke-width="5" fill="none" stroke-linecap="round"/>
                    </g>
                `;
            }

            return `
                <svg viewBox="0 0 150 150" class="overflow-visible ${className}" xmlns="http://www.w3.org/2000/svg">
                    <!-- Legs -->
                    <path d="M 55 110 L 55 140 L 65 140 M 85 110 L 85 140 L 95 140" stroke="#111827" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                    <!-- Body -->
                    <path d="M 35 120 C 35 40, 45 25, 75 25 C 105 25, 115 40, 115 120 Z" fill="white" stroke="#111827" stroke-width="6" stroke-linejoin="round"/>
                    <!-- Blush -->
                    <ellipse cx="45" cy="72" rx="10" ry="5" fill="#fecdd3" opacity="0.9"/>
                    <ellipse cx="105" cy="72" rx="10" ry="5" fill="#fecdd3" opacity="0.9"/>
                    <!-- Eyes -->
                    <circle cx="60" cy="62" r="5" fill="#111827"/>
                    <circle cx="90" cy="62" r="5" fill="#111827"/>
                    <!-- Cute Smile -->
                    <path d="M 50 78 Q 75 98 100 78" stroke="#111827" stroke-width="5" fill="none" stroke-linecap="round"/>
                    ${props}
                </svg>
            `;
        }

        // --- PHOTOGRAPHY DATA ---
        const photographers = [
            {
                id: 1,
                name: "Label Knot",
                price: "1.2 Lakhs",
                tagline: "The Essential Coverage",
                events: ["Engagement", "Madhuram Veppu", "Wedding"],
                crew: "2 Photographers + 2 Videographers",
                deliverables: [
                    "2 Premium Albums (50 leaf)",
                    "2 Mini Books & 4 Photo Frames",
                    "2 Table Top Calendars",
                    "Highlight & Full Length Videos"
                ],
                perks: [],
                contact: "www.labelknotweddings.com",
                instagramHandle: "@labelknot_weddings",
                instagramLink: "https://www.instagram.com/labelknot_weddings?igsh=MWlsbjl5aHZqMzhjeg==",
                notes: ["Fixation coverage not explicitly mentioned in base price.", "Travel is additional."],
                color: "from-emerald-50 to-teal-50",
                badge: "Most Affordable",
                flork: "heart"
            },
            {
                id: 2,
                name: "Orenda Frames",
                price: "1.5 Lakhs",
                tagline: "The Balanced Choice",
                events: ["Engagement", "Madhuramvepu (Both)", "Wedding"],
                crew: "2 Photographers + 2 Videographers",
                deliverables: [
                    "2 Albums (80 pages)",
                    "2 Photo frames",
                    "25 Edited Photos highlighted",
                    "Highlight & Full Length Videos"
                ],
                perks: [],
                contact: "Contact not specified",
                instagramHandle: "@orenda_frames",
                instagramLink: "https://www.instagram.com/orenda_frames?igsh=MTVrNG54ZHN1bzdoMA==",
                notes: ["Great balance of coverage across all 3 main events."],
                color: "from-blue-50 to-indigo-50",
                badge: "Best Value",
                flork: "flower"
            },
            {
                id: 3,
                name: "Adam's Light",
                price: "1.8 Lakhs",
                tagline: "The Fast Delivery Experts",
                events: ["Engagement", "Madhuram Veppu (Both)", "Wedding"],
                crew: "2 Photographers + 2 Videographers",
                deliverables: [
                    "2 Albums (100 pages) & 2 Mini Albums",
                    "Online Signature Album (in 5 days)",
                    "Highlights, 1 Reel & Full length video",
                    "Calendar"
                ],
                perks: ["Online album delivered within 5 days", "No travel fees in Kottayam/Ernakulam"],
                contact: "Alen George",
                instagramHandle: "@adam.lights",
                instagramLink: "https://www.instagram.com/adam.lights?igsh=bHVwNWljazUwMW82",
                notes: ["Extra Rs. 30k if founder is requested."],
                color: "from-violet-50 to-purple-100",
                badge: "Fast Delivery",
                flork: "camera"
            },
            {
                id: 11,
                name: "Psych Ads",
                price: "2.0 Lakhs",
                tagline: "The Both-Sides Package",
                events: ["Fixation", "Engagement (Both)", "Madhuramvepp (Both)", "Wedding (Both)"],
                crew: "1P+1V for Fixation | 2P+2V for Main",
                deliverables: [
                    "Two Premium 12x15 Albums (100 pages)",
                    "Highlights (Fixation & Wed) & Full Videos",
                    "Framed Photos & Calendar",
                    "Max 350 Graded Pictures"
                ],
                perks: ["Covers both sides (Bride & Groom)"],
                contact: "Ph: +91 7356023706",
                instagramHandle: "@psych_ads",
                instagramLink: "https://www.instagram.com/psych_ads", 
                notes: ["Travel (fuel) & Accommodation are extra.", "Strict terms on delivery timelines."],
                color: "from-amber-50 to-orange-100",
                badge: "Both Sides",
                flork: "heart"
            },
            {
                id: 10,
                name: "Shabeer Zyed",
                price: "3.0 Lakhs",
                tagline: "The Grand 5-Event Package",
                events: ["Fixation", "Engagement", "Madhuram Veppu", "Wedding", "Save the Date"],
                crew: "Large crew varying by event",
                deliverables: [
                    "2 Premium 50-Leaf Magazine Albums",
                    "800 edited pictures & soft copies",
                    "3-5 min highlight & 5 full length videos"
                ],
                perks: ["Complimentary 2hr Save the Date shoot"],
                contact: "Fousia: 9567177678",
                instagramHandle: "@shabeerzyed_photography",
                instagramLink: "https://www.instagram.com/shabeerzyed_photography?igsh=a3M1ZzZsMnh0YTNm",
                notes: ["Highest price.", "Travel, food & accommodation are extra."],
                color: "from-rose-50 to-pink-100",
                badge: "Premium",
                flork: "flower"
            }
        ];

        // --- RENDER LOGIC ---
        
        // 1. Inject Header/Footer Florks
        document.getElementById('header-flork-1').innerHTML = getFlorkSvg('flower', 'w-24 h-24');
        document.getElementById('header-flork-2').innerHTML = getFlorkSvg('heart', 'w-28 h-28');
        document.getElementById('footer-flork').innerHTML = getFlorkSvg('camera', 'w-32 h-32');

        // 2. Generate and Inject Cards
        const container = document.getElementById('cards-container');
        
        photographers.forEach(photo => {
            
            // Build events HTML
            const eventsHtml = photo.events.map(e => `
                <span class="bg-white text-slate-700 text-xs px-3 py-1.5 rounded-lg font-medium shadow-sm border border-slate-100">
                    ${e}
                </span>
            `).join('');

            // Build deliverables HTML
            const deliverablesHtml = photo.deliverables.map(item => `
                <li class="flex items-start text-sm text-slate-700 font-medium bg-white/40 p-2.5 rounded-xl">
                    <i data-lucide="check-circle-2" class="w-4 h-4 mr-3 text-emerald-500 shrink-0 mt-0.5"></i>
                    <span class="leading-tight">${item}</span>
                </li>
            `).join('');

            // Build perks HTML
            const perksHtml = photo.perks.map(perk => `
                <div class="text-sm font-semibold text-emerald-600 mb-1 flex items-center gap-2">
                    ✨ ${perk}
                </div>
            `).join('');

            // Build notes HTML
            const notesHtml = photo.notes.map(note => `
                <div class="text-xs text-slate-500 font-medium mb-1">
                    * ${note}
                </div>
            `).join('');

            // Badge HTML (conditional)
            const badgeHtml = photo.badge ? `
                <div class="absolute -top-4 -right-4 bg-white shadow-md text-slate-800 font-bold px-5 py-2 rounded-full border-2 border-rose-100 flex items-center gap-2 z-10 rotate-3 group-hover:rotate-0 transition-transform">
                    <i data-lucide="star" class="w-4 h-4 text-rose-400 fill-rose-400"></i>
                    ${photo.badge}
                </div>
            ` : '';

            // Instagram Button HTML (conditional)
            const instagramHtml = photo.instagramLink ? `
                <a href="${photo.instagramLink}" target="_blank" rel="noopener noreferrer" 
                   class="group relative flex items-center justify-center gap-2 w-full px-4 py-3.5 text-sm font-bold text-white transition-all duration-300 rounded-2xl overflow-hidden bg-gradient-to-r from-pink-500 to-rose-500 hover:shadow-lg hover:shadow-rose-300/50">
                    <div class="absolute inset-0 w-full h-full bg-white/25 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-in-out"></div>
                    <i data-lucide="instagram" class="w-5 h-5 relative z-10"></i>
                    <span class="relative z-10">Follow ${photo.instagramHandle}</span>
                </a>
            ` : '';

            // Notes Section HTML (conditional)
            const notesSectionHtml = (photo.notes.length > 0 || photo.perks.length > 0) ? `
                <div class="bg-white/50 p-4 rounded-2xl border border-white border-dashed">
                    ${perksHtml}
                    ${notesHtml}
                </div>
            ` : '';

            // Combine into main card
            const cardHtml = `
                <div class="relative bg-gradient-to-br ${photo.color} rounded-[2.5rem] p-8 shadow-lg shadow-rose-100/50 border-4 border-white transition-all duration-300 hover:shadow-xl hover:-translate-y-2 group">
                    ${badgeHtml}

                    <!-- Header -->
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h2 class="text-3xl font-black text-slate-900 mb-1">${photo.name}</h2>
                            <div class="inline-block bg-white/60 text-slate-700 px-3 py-1 rounded-xl text-sm font-semibold mb-3">
                                ${photo.tagline}
                            </div>
                            <div class="text-4xl font-extrabold text-rose-500">
                                ₹${photo.price}
                            </div>
                        </div>
                        <div class="w-20 h-20 bg-white/50 rounded-full flex items-center justify-center -mt-2 -mr-2 shadow-inner group-hover:scale-110 transition-transform">
                            ${getFlorkSvg(photo.flork, 'w-16 h-16')}
                        </div>
                    </div>

                    <!-- Content Grid -->
                    <div class="space-y-6">
                        
                        <!-- Events & Crew -->
                        <div class="bg-white/60 rounded-2xl p-4 space-y-3">
                            <div>
                                <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-2 flex items-center gap-2">
                                    <i data-lucide="heart" class="w-4 h-4 text-rose-400 fill-rose-200"></i> Coverage
                                </h3>
                                <div class="flex flex-wrap gap-2">
                                    ${eventsHtml}
                                </div>
                            </div>
                            <div class="text-sm font-medium text-slate-700 bg-white/50 py-2 px-3 rounded-xl border border-white">
                                📸 ${photo.crew}
                            </div>
                        </div>

                        <!-- Deliverables -->
                        <div>
                            <h3 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-3 ml-2 flex items-center gap-2">
                                <i data-lucide="gift" class="w-4 h-4 text-rose-400"></i> You'll Get
                            </h3>
                            <ul class="space-y-2.5">
                                ${deliverablesHtml}
                            </ul>
                        </div>

                        <!-- Notes/Perks -->
                        ${notesSectionHtml}

                        <!-- Contact & Instagram Button -->
                        <div class="mt-5 pt-4 border-t-2 border-white space-y-3">
                            <div class="flex items-center text-sm text-slate-700 font-medium bg-white/80 p-3 rounded-xl shadow-sm">
                                <i data-lucide="phone" class="w-4 h-4 mr-2 text-rose-500 shrink-0"></i>
                                <span>${photo.contact}</span>
                            </div>
                            ${instagramHtml}
                        </div>
                    </div>
                </div>
            `;

            container.innerHTML += cardHtml;
        });

        // 3. Initialize Lucide Icons after generating HTML
        lucide.createIcons();
    </script>
</body>
</html>
