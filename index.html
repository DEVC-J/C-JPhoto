<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photography Quotes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>

                    }
                }
            }
        }
    </script>
</head>

        <div id="header-flork-1" class="absolute top-4 left-4 md:left-12 animate-bounce-slow hidden sm:block rotate-[-10deg]"></div>

        </p>
    </div>

    <div class="max-w-7xl mx-auto px-4 md:px-8 mb-8 flex flex-wrap justify-center gap-4">

        </button>

            <i data-lucide="mail" class="w-5 h-5"></i>
            <span>Guest List</span>
        </button>
    </div>
